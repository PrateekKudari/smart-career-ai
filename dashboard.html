<!DOCTYPE html>
<html lang="en">

<head>

    <title>Dashboard</title>

    <link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-5">
        Smart Career AI Dashboard
    </h1>

    <div class="row">

        <div class="col-md-4">

            <div class="card shadow p-4">

                <h3>Total Resumes</h3>

                <h1>{{ total_resumes }}</h1>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow p-4">

                <h3>Average Score</h3>

                <h1>{{ avg_score }}</h1>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow p-4">

                <h3>Top Category</h3>

                <h4>{{ top_category }}</h4>

            </div>

        </div>

    </div>

    <div class="card mt-5 shadow p-4">

        <h3 class="mb-4">
            Skills Analytics
        </h3>

        <img
            src="{{ url_for('static',
            filename='charts/skills_chart.png') }}"
            class="img-fluid"
            alt="Skills Analytics Chart"
        >

    </div>

    <div class="text-center mt-5">

        <a href="/"
        class="btn btn-dark btn-lg">

            Back Home

        </a>

    </div>

</div>

</body>
</html>
