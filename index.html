<!DOCTYPE html>
<html lang="en">

<head>

    <title>Smart Career AI</title>

    <link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container mt-5">

    <div class="hero-section text-center">

        <h1 class="main-title">
            Smart Career AI
        </h1>

        <p class="lead">
            AI Powered Resume Analyzer &
            Salary Predictor
        </p>

    </div>

    <div class="row mt-5">

        <!-- Resume Upload -->

        <div class="col-md-6">

            <div class="card custom-card">

                <h2 class="mb-4">
                    Resume Analyzer
                </h2>

                <form
                    action="/upload_resume"
                    method="POST"
                    enctype="multipart/form-data"
                >

                    <input
                        type="file"
                        name="resume_file"
                        class="form-control mb-4"
                        required
                    >

                    <button
                        type="submit"
                        class="btn btn-primary w-100"
                    >

                        Analyze Resume

                    </button>

                </form>

            </div>

        </div>

        <!-- Salary Prediction -->

        <div class="col-md-6">

            <div class="card custom-card">

                <h2 class="mb-4">
                    Salary Predictor
                </h2>

                <form
                    action="/predict_salary_form"
                    method="POST"
                >

                    <input
                        type="number"
                        name="experience"
                        class="form-control mb-3"
                        placeholder="Experience Level"
                        required
                    >

                    <input
                        type="number"
                        name="employment"
                        class="form-control mb-3"
                        placeholder="Employment Type"
                        required
                    >

                    <input
                        type="number"
                        name="remote"
                        class="form-control mb-3"
                        placeholder="Remote Ratio"
                        required
                    >

                    <input
                        type="number"
                        name="company"
                        class="form-control mb-4"
                        placeholder="Company Size"
                        required
                    >

                    <button
                        type="submit"
                        class="btn btn-success w-100"
                    >

                        Predict Salary

                    </button>

                </form>

            </div>

        </div>

    </div>

    <div class="text-center mt-5">

        <a href="/dashboard"
        class="btn btn-dark btn-lg">

            Open Analytics Dashboard

        </a>

    </div>

</div>

</body>
</html>
